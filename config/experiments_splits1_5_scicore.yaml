# SciCORE: train on node /tmp; Snakemake outputs on shared storage (login-visible).
#
#   export SCICORE_LAB_ROOT=~/epiplexity_storage/rmd17_aspirin_s1to5_ws_metrics_noise
#   mkdir -p /tmp/epiplexity_mlip/rmd17_aspirin_s1to5_ws_metrics_noise/checkpoints
#   mkdir -p "${SCICORE_LAB_ROOT}/checkpoints"
#   bash scripts/scicore_use_lab_storage.sh && source .scicore_lab_env
#   cd ~/epiplexity && export TMPDIR=/tmp
#   snakemake --profile profiles/scicore --configfile "${GENERATED_CONFIG}" -j 40
#
# Matrix: splits 1–5 only (no seed sweep). Window metrics share ws/stride; "random"
# shuffles the same sliding windows. Baseline + teacher_noise variant per selection.

molecule: rmd17_aspirin

execution:
  python_bin: /scicore/home/meuwly/boitti0000/mmml/.venv/bin/python
  resume: true

dataset:
  data_path: /scicore/home/meuwly/boitti0000/data/rmd17/npz_data/rmd17_aspirin.npz
  splits_dir: ""
  split_ids: [1, 2, 3, 4, 5]
  max_structures: null
  convert_to_ev: true

model:
  cutoff: 12.0

training:
  ckpt_root: /tmp/epiplexity_mlip/rmd17_aspirin_s1to5_ws_metrics_noise/checkpoints
  num_epochs: 1000
  batch_size: 10
  learning_rate: 0.001
  n_train: 500
  n_valid: 500
  energy_weight: 1.0
  forces_weight: 52.91
  save_every_epoch: false
  save_every_n_epochs: 50
  log_tb: false
  print_freq: 1

student:
  epochs: 1000
  learning_rate: 0.001
  model:
    features: 32
    max_degree: 0
    num_iterations: 2
    num_basis_functions: 16
    cutoff: 12.0
    charges: false
    zbl: false

selection_matrix:
  seeds: [42]
  include_random_split: false
  metrics: [random, gzip_bytes_cart, gzip_bytes_zmat, gzip_bytes_soap]
  window_size: 10
  stride: 10
  train_fraction: 0.5

outputs:
  shared_ckpt_root: __SCICORE_LAB_ROOT__/checkpoints
  aggregate_results_json: __SCICORE_LAB_ROOT__/checkpoints/experiment_results.json
  snakemake_done_dir: __SCICORE_LAB_ROOT__/checkpoints/snakemake_done

teacher_noise:
  enabled: true
  scale: 1.0
  run_suffix: teacher_noise
