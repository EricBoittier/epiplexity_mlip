# SciCORE: splits 1–5; checkpoints on node /tmp (large, not counted against $HOME).
#
# On the login node before snakemake:
#   mkdir -p /tmp/epiplexity_mlip/rmd17_aspirin_splits1_5/checkpoints
#   cd ~/epiplexity
#   export TMPDIR=/tmp
#   snakemake --profile profiles/scicore --configfile config/experiments_splits1_5_scicore.yaml
#
# Note: /tmp is per compute node and may be cleared when the job ends. Copy
# experiment_metadata/ and experiment_results.json to lab storage if you need them later.

molecule: rmd17_aspirin

execution:
  python_bin: /scicore/home/meuwly/boitti0000/mmml/.venv/bin/python
  resume: true

dataset:
  data_path: /scicore/home/meuwly/boitti0000/data/rmd17/npz_data/rmd17_aspirin.npz
  splits_dir: ""
  split_ids: [1, 2, 3, 4, 5]
  max_structures: null
  convert_to_ev: true

model:
  cutoff: 12.0

training:
  ckpt_root: /tmp/epiplexity_mlip/rmd17_aspirin_splits1_5/checkpoints
  num_epochs: 1000
  batch_size: 50
  learning_rate: 0.001
  n_train: 950
  n_valid: 50
  energy_weight: 1.0
  forces_weight: 52.91
  save_every_epoch: false
  save_every_n_epochs: 50
  log_tb: false
  print_freq: 1

student:
  epochs: 1000
  learning_rate: 0.001
  model:
    features: 32
    max_degree: 0
    num_iterations: 2
    num_basis_functions: 16
    cutoff: 12.0
    charges: false
    zbl: false

selection_matrix:
  seeds: [42, 43, 44]
  metrics: [gzip_bytes_cart, gzip_bytes_zmat, gzip_bytes_soap]
  window_size: 10
  stride: 10
  train_fraction: 0.95

outputs:
  aggregate_results_json: /tmp/epiplexity_mlip/rmd17_aspirin_splits1_5/checkpoints/experiment_results.json
  snakemake_done_dir: /tmp/epiplexity_mlip/rmd17_aspirin_splits1_5/checkpoints/snakemake_done

teacher_noise:
  enabled: false
  scale: 0.0
  run_suffix: teacher_noise
